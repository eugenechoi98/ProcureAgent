services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -m
      - uvicorn
      - procureguard.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    environment:
      DATABASE_PATH: /app/runtime/procureguard.db
      UPLOAD_DIR: /app/runtime/uploads
    ports:
      - "8000:8000"
    volumes:
      - procureguard-runtime:/app/runtime
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - python
      - -c
      - "from demo.app import build_app; build_app().launch(server_name='0.0.0.0', server_port=7860, share=False, inbrowser=False, show_error=True)"
    environment:
      GRADIO_ANALYTICS_ENABLED: "False"
      NO_PROXY: 127.0.0.1,localhost
      no_proxy: 127.0.0.1,localhost
    ports:
      - "7860:7860"
    restart: unless-stopped

volumes:
  procureguard-runtime:
